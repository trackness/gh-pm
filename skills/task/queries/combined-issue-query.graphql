{ repository(owner: "<owner>", name: "<repo>") {
    issue(number: <issueNumber>) {
      id
      blockedBy(first: 20) { nodes { number state stateReason } }
      parent {
        number title
        subIssues(first: 20) { nodes { number title state } }
      }
      linkedBranches(first: 5) { nodes { id ref { name } } }
    }
  }
}
